l_english:
 councillor_chancellor_roman: "Magister Officiorum"
 councillor_chancellor_roman_tooltip: "The $councillor_chancellor_roman$ is, effectively, the head of government in the Roman system. The office is in charge of diplomatic efforts as well as realm internal realm business and thus has several subsidiary organs attached to the office. The office itself functions as a [chancellor|E] in other governments."
 councillor_marshal_roman: "Magister Militum"
 councillor_marshal_roman_tooltip: "The #italic Magister Militum#! was the highest level of Roman military commander, roughly equivalent to a modern field martial. In the West, the office consolidated into a military dictatorship during the decline of the Western Empire, while the rank remained split between different commands in the East until the rise of the Thematic system.\nBecause of the limitations of game mechanics, #italic When the World Stopped Making Sense#! has a single council-level position for the military high-command in the Roman Empires."
 #Chancellery
 councillor_clerical_bureau_director: "Magister Scrinii Memoriae"
 councillor_clerical_bureau_director_tooltip: "The #italic Scrinum Memoriae#! was the bureau that drafted documents for the Emperor's approval, such as imperial decrees and appointments, and served as the Imperial archive."
 councillor_clerical_bureau_director_desc: "$councillor_clerical_bureau_director_tooltip$"
 councillor_correspondence_bureau_director: "Magister Scrinii Epistularum"
 councillor_correspondence_bureau_director_tooltip: "The #italic Scrinum Epistularum#! was the bureau that handled the Emperor's correspondence, managed representation with foreign powers, and served as the imperial translation service."
 councillor_correspondence_bureau_director_desc: "$councillor_chancellor_roman_tooltip$"
 councillor_legal_bureau_director: "Magister Scrinii Libellorum"
 councillor_legal_bureau_director_tooltip: "The #italic Scrinum Libellorum#! was the bureau responsible for managing the various legal petitions the Emperor received."
 councillor_legal_bureau_director_desc: "$councillor_legal_bureau_director_tooltip$"
 councillor_imperial_guard_director: "Magister Scholae Palatinae"
 councillor_imperial_guard_director_desc: "The #italic Scholae Palatinae#! is the body guard of the emperor, organized into a few regiments and under the authority of the $councillor_chancellor_roman$."
 councillor_imperial_guard_director_tooltip: "$councillor_imperial_guard_director_desc$"
 #Other Positions
 councillor_judge_of_the_court: "Quaestor Sacri Palatii"
 councillor_judge_of_the_court_desc: "The office of the Quaestor of the Sacred Palace was the senior legal authority in the late Roman Empire, responsible for the drafting of laws as well as the administration of justice in the empire."
 councillor_judge_of_the_court_tooltip: "$councillor_judge_of_the_court_desc$"
 councillor_count_imperial_treasury: "Comes Sacrarum Largitonum"
 councillor_count_imperial_treasury_desc: "The Count of the Imperial Treasury Oversses the collection of Imperial taxes, manages the Imperial Treasury, and controls Imperial mints and state-run industries.
 councillor_count_imperial_treasury_tooltip: "$councillor_count_imperial_treasury_desc$"
 