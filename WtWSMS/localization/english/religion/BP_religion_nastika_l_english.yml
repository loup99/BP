 #Doctrines
 special_doctrine_is_nastika_faith_name: "Teachings of the Śramanas"
 special_doctrine_is_nastika_faith_desc: "We must not be lead astray by promises held only in the next life. Our responsibilities lie in this world, no matter which sage taught us."
 
 special_doctrine_humanistic_philosophy_name: "Humanistic Philosophy"
 special_doctrine_humanistic_philosophy_desc: "The world can be understood through human reason. Those who see this truth deserve to be judged on their own merits."
 
