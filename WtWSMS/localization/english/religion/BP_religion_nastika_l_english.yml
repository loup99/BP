l_english:

 #Faiths
 nastika_religion: "Nāstika"
 nastika_religion_adj: "Nāstika"
 nastika_religion_adherent: "Nāstika"
 nastika_religion_adherent_plural: "Nāstikas"
 nastika_religion_desc: "The Nāstika schools descend from the Śramana traditions that gave rise to Jainism and Buddhism. Central to their philosophy is a rejection of karma, with human actions unable to sway their fate. To pursue sukha is to live a fulfilling life and to treat others with honor and an open mind."

 ajivika: "Ājīvika"
 ajivika_adj: "$ajivika$"
 ajivika_adherent: "$ajivika$"
 ajivika_adherent_plural: "Ājīvikas"
 ajivika_desc: "Ājīvika, the Way of Life, holds that all souls shall be liberated through paths predetermined by fate. It was brought to prominence by Makkhali Gosala, and observes its ascetic principles for their own sake rather than as a means to enlightenment."

 carvaka: "Lokāyata"
 carvaka_adj: "$carvaka$"
 carvaka_adherent: "$carvaka$"
 carvaka_adherent_plural: "Lokāyatas"
 carvaka_desc: "Predating Jainism or Buddhism, the Lokāyata school is most known for its rejection of inference as a means of establishing metaphysical truths. This school also denied the existence of souls, and the fifth element. They also denied an afterlife, and believed pleasure to be acceptable."

 ajnana: "Ajñana"
 ajnana_adj: "Ajñana"
 ajnana_adherent: "Ajñana"
 ajnana_adherent_plural: "Ajñanas"
 ajnana_desc: "Ajñana embraces radical skepticism, seeing the fundamental truths of the universe as unknowable and the claims of prophets as contradictory."

