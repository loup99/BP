l_english:
 #High Tribals
 game_concept_high_tribal_government: "High Tribal Government"
 game_concept_high_tribal_i: "@government_type_high_tribal!"
 game_concept_high_tribal_short: "High Tribal"
 game_concept_high_tribal_noun: "High Tribalism"
 game_concept_high_tribal_government_desc: "$game_concept_high_tribal_noun$ represents the small-scale government of a post-tribal realm in which neither strong land-based nor tax-based governments have been established, where tribal loyalties of old still dominate government. This transition form of government is unable to control large swaths of land or many vassals."
 game_concept_high_tribal_organization: "High Tribal Organization"
 game_concept_high_tribal_organization_desc: "$game_concept_high_tribal_organization$ represents the degree of organization of the liege over his [vassals|E] and the state, shifting away from old tribal traditions in favor of a more powerful state.\n\nWhile it has many of the same features as [tribes|E], the [development_growth|E] in [high_tribal_government|E] counties depends upon the [high_tribal_organization|E]; at [high_tribal_organization_0|E], there is a #N 40%#! [development_growth|E] malus, with the malus decreasing with increasing levels of centralization.\n\nThere are four levels of $game_concept_tribal_authority$: [high_tribal_organization_0|E], [high_tribal_organization_1|E], [high_tribal_organization_2|E], and [high_tribal_organization_3|E]. Increasing $game_concept_tribal_authority$ costs an amount of [prestige|E] depending on the level and the ruler's [learning_skill|E].\n\n#weak Vassals dislike higher levels of $game_concept_high_tribal_organization$, and lowering it is the primary goal of any [liberty_faction|E]."
 game_concept_high_tribal_organization_0: "Disparate Tribes"
 game_concept_high_tribal_organization_0_desc: ""
 game_concept_high_tribal_organization_1: "Low Organization"
 game_concept_high_tribal_organization_1_desc: ""
 game_concept_high_tribal_organization_2: "Moderate Organization"
 game_concept_high_tribal_organization_2_desc: ""
 game_concept_high_tribal_organization_3: "High Organization"
 game_concept_high_tribal_organization_3_desc: ""
 
 #Pre-Feudals
 game_concept_prefeudal_government: "Pre-Feudal Government"
 game_concept_prefeudal_i: "@government_type_prefeudal!"
 game_concept_prefeudal_short: "Pre-Feudal"
 game_concept_prefeudal_noun: "Pre-Feudalism"
 game_concept_prefeudal_government_desc: "$game_concept_prefeudal_noun$ government represents all of the non-tribal states across the map prior to the feudal mutation, Muslim conquest, Indian religion spread, Persian influence, or Roman expansion. This rich array of different government practices are distinct from tribal and nomadic realms, given the existence of a sedentary aristocracy with relative centralization."
 game_concept_prefeudal_authority: "Pre-Feudal Authority"
 game_concept_prefeudal_authority_desc: "$game_concept_prefeudal_noun$ represents the general power that a [ruler|E] wields over their [vassals|E].\n\nIncreasing $game_concept_prefeudal_authority$ costs an amount of [prestige|E] depending on the level and the ruler's [learning_skill|E].\n\nIt is more restricted than [feudal_government|E] [crown_authority|E]\n\n#weak Vassals dislike higher levels of $game_concept_prefeudal_authority$, and lowering it is the primary goal of [Concept( 'liberty_faction', 'Liberty Factions' )|E].#!"
 
 #Rajamandala
 game_concept_rajamandala_government: "Rajamandala Government"
 game_concept_rajamandala_i: "@government_type_rajamandala!"
 game_concept_rajamandala_short: "Rajamandala"
 game_concept_rajamandala_noun: "Rajamandala"
 game_concept_rajamandala_government_desc: "$game_concept_rajamandala_noun$ government is centered around the #italic Raja#! (ruler) and was first described by Chanakya in the political work #italic Arthashastra#!. In #EMP When the World Stopped making Sense#!, it is used to refer to the various governments within the greater Indian Sphere. While there is no standard unified administrative divisions or structure, there was an increase in the level of centralization and record-keeping was highly developed with a complex system for amongst others the registration of land, donations, income and expenditure."
 game_concept_rajamandala_authority: "Centralization"
 game_concept_rajamandala_authority_desc: "$game_concept_rajamandala_authority$ represents the overall centralization of the Gupta realm. While it had a scholar-based bureaucracy, significant power was devolved into the feudatories that comprised the realm when compared to the administration of other nations like Rome or Persia."
 
 #Iranian Dynastic
 game_concept_iranian_dynastic_government: "Iranian Dynastic Government"
 game_concept_iranian_dynastic_government_i: "@government_type_iranian_dynastic!"
 game_concept_iranian_dynastic_government_short: "Iranian Dynastic"
 game_concept_iranian_dynastic_government_noun: "Iranian Dynastic"
 game_concept_iranian_dynastic_government_desc: "The Sassanid form of government is the absolute fusion of church and state, entertaining a precarious balance of power between local lord and Shahanshah. Further bolstered by a powerful bureaucracy and priesthood, this government is the product of centuries of Sassanid rule."
 game_concept_iranian_dynastic_authority: "Secular Authority"
 game_concept_iranian_dynastic_authority_desc: "$game_concept_iranian_dynastic_authority$ represents the power of the Sasanian government officials over their secular vassals.\n\nWhile similar to [crown_authority|E], one of the key differences is that at low levels of $game_concept_iranian_dynastic_authority$, the Shahanshah must grant counties to characters who are already landed #bold or#! who come from powerful families or risk their anger."
 game_concept_iranian_dynastic_authority_0: "Decentralized Rule"
 game_concept_iranian_dynastic_authority_0_desc: ""
 game_concept_iranian_dynastic_authority_1: "Low Secular Authority"
 game_concept_iranian_dynastic_authority_1_desc: ""
 game_concept_iranian_dynastic_authority_2: "Moderate Secular Authority"
 game_concept_iranian_dynastic_authority_2_desc: ""
 game_concept_iranian_dynastic_authority_3: "High Secular Authority"
 game_concept_iranian_dynastic_authority_3_desc: ""
 
 game_concept_clerical_influence: "Clerical Influence"
 game_concept_clerical_influence_desc: "$game_concept_clerical_influence$ represents the overall influence of the Mazdayasna priests had on the Sasanian State in a way that, while similar, was structurally different than its Roman counterparts. The Mowbeds' influence waxed and waned over the course of the empire, and with it certain powers and traditions morphed alongside it.\n\nIn game, this is represented by a special realm law applying to the Emperor who has currently vassalized the [faith|E]'s $game_concept_head_of_faith$. Curtailing the Mowbeds' power increases clerical taxation, improves infidel opinion, and gives the Emperor more of a say in who his realm priest should be, while angering your [theocracy|E] [vassals|E] and removing certain powers that an empowered priesthood would have."
 game_concept_clerical_influence_0: "Weak Clerical Influence"
 game_concept_clerical_influence_0_desc: ""
 game_concept_clerical_influence_1: "Moderate Clerical Influence"
 game_concept_clerical_influence_1_desc: ""
 game_concept_clerical_influence_2: "Strong Clerical Influence"
 game_concept_clerical_influence_2_desc: ""
 game_concept_clerical_influence_3: "Theocratic State"
 game_concept_clerical_influence_3_desc: ""
 
 #Roman Dynastic
 game_concept_roman_dynastic_government: "Roman Dynastic Government"
 game_concept_roman_dynastic_government_i: "@government_type_roman_dynastic!"
 game_concept_roman_dynastic_government_short: "Roman Dynastic"
 game_concept_roman_dynastic_government_noun: "Roman Dynastic"
 game_concept_roman_dynastic_government_desc: "Built upon traditional Roman government and refined as time went on, the civilian administration of the Roman provinces maintained a separation of military and civil offices, strengthening the power of the central government."
 
 game_concept_roman_dynastic_authority: "State Authority"
 game_concept_roman_dynastic_authority_desc: "$game_concept_roman_dynastic_authority$ represents the power of the Emperor over the mechanics of state.\n\nWhile similar to [crown_authority|E], one of the key differences is that at low levels of $game_concept_roman_dynastic_authority$, it always allows for title revocation and prevents titles from being inherited outside the Realm."
 
 #Roman Administrative
 game_concept_roman_administrative_government: "Roman Administrative Government"
 game_concept_roman_administrative_government_i: "@government_type_roman_dynastic!"
 game_concept_roman_administrative_government_short: "Roman Administrative"
 game_concept_roman_administrative_government_noun: "Roman Administrative"
 game_concept_roman_administrative_government_desc: "Built upon traditional Roman government and refined as time went on, the civilian administration of the Roman provinces maintained a separation of military and civil offices, strengthening the power of the central government."
 
 #Subroman
 game_concept_subroman_dynastic_government: "Sub-Roman Dynastic Government"
 game_concept_subroman_dynastic_government_i: "@government_type_subroman_dynastic!" #FIXME: ICON
 game_concept_subroman_dynastic_government_short: "Sub-Roman Dynastic"
 game_concept_subroman_dynastic_government_noun: "$game_concept_subroman_dynastic_government_short$"
 game_concept_subroman_dynastic_government_desc: "$game_concept_subroman_dynastic_government_noun$ government is based upon the decaying Roman institutions across the former empire. Rulers are able to hold cities and uphold tax-collecting, but in return have fewer levies. As the institutions decay with land being distributed and the culturally civilian aristocracy adopts new military or ecclesiastical values, it decays."
 
 #Subroman Administrative
 game_concept_subroman_administrative_government: "Sub-Roman Administrative Government"
 game_concept_subroman_administrative_government_i: "@government_type_subroman_dynastic!" #FIXME: ICON
 game_concept_subroman_administrative_government_short: "Sub-Roman Administrative"
 game_concept_subroman_administrative_government_noun: "Sub-Roman Administrative"
 game_concept_subroman_administrative_government_desc: "$game_concept_subroman_administrative_government_noun$ government is based upon the decaying Roman institutions across the former empire. Rulers are able to hold cities and uphold tax-collecting, but in return have fewer levies. As the institutions decay with land being distributed and the culturally civilian aristocracy adopts new military or ecclesiastical values, it decays."
 
 #Roman Federate
 game_concept_roman_federate_administrative_government: "Roman Federate"
 game_concept_roman_federate_administrative_government_i: "@government_type_tribal!" #FIXME: ICON
 game_concept_roman_federate_administrative_government_short: "Federate"
 game_concept_roman_federate_administrative_government_noun: "Roman Federate"
 game_concept_roman_federate_administrative_government_desc: "$game_concept_roman_federate_administrative_government$ is based on the Roman #italic Foederatus#! contracts, in which Rome surrender the taxation of certain parcels of land to foreign tribes in exchange for subsidies and support during war. A unique blend of tribal and administrative government, $game_concept_roman_federate_administrative_government$ has access to cheap men-at-arms and [title_men_at_arms|E], but retains many features of [tribal_government|E]."
 