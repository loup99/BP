 MILITARY_PROVINCE_AVAIL_TT_PROVINCE_COUNT_NET_ROUND_DOWN: "$TAB$ #weak (Rounds Down to [GetPlayer.MakeScope.ScriptValue('number_of_military_provinces__province_count_net_round_down')])#!"
