l_english:
 #Generic Hegemony Has Fallen
 bp_hegemonic_collapse.0001.name: "[the_hegemony.GetNameNoTooltip] has Fallen!"
 bp_hegemonic_collapse.0001.desc.me: "As the [the_hegemony.GetName] has dwindled in size, it can no longer maintain the pretense of being a Hegemony and has shattered; all empires under my banner have collapsed and several successor kingdoms have arisen. [the_hegemony.GetNameNoTooltip] is no more..."
 bp_hegemonic_collapse.0001.desc.others: "As the [the_hegemony.GetName] has dwindled in size, it can no longer maintain the pretense of being a Hegemony and has shattered; all empires under [the_bag_holder.GetNamePossessive] banner have collapsed and several successor kingdoms have arisen. [the_hegemony.GetNameNoTooltip] is no more..."
 bp_hegemonic_collapse.0001.a: "How could this have happened!?"
 #A Part of the Roman Empire has Fallen
 #Localization collision if "blah" is "name"
 bp_hegemonic_collapse.0010.blah: "[the_hegemony.GetNameNoTooltip] has Fallen!"
 bp_hegemonic_collapse.0010.desc.me_a_rome: "As the [the_hegemony.GetName] has dwindled in size, it can no longer maintain the pretense of being a part of the Roman Empire; it has instead collapsed under the weight of its own pretensions and the various Praetorian Prefectures have been demolished. Now all the remains are a set of rump states, and the one I control, [the_bag_holder.GetPrimaryTitle.GetName] is but one of many."
 bp_hegemonic_collapse.0010.desc.me_full_rome: "Once the [the_hegemony.GetName] ruled the world, from Britannia to Aegyptus. The world trembled when the #italic Augustus#! spoke. Now, repeated civil wars, disorder, and barbarian incursions have so greatly intruded that Rome can no longer maintain even a modicum of power necessary to have the world acknowledge it. I, [the_bag_holder.GetName], have failed to hold together what Augustus and Trajan had built."
 bp_hegemonic_collapse.0010.desc.others_a_rome: "As the [the_hegemony.GetName] has dwindled in size, it can no longer maintain the pretense of being a part of the Roman Empire; it has instead collapsed under the weight of its own pretensions and the various Praetorian Prefectures have been demolished. Now all the remains are a set of rump states."
 bp_hegemonic_collapse.0010.desc.others_full_rome: "Once [the_hegemony.GetName] ruled the world, from Britannia to Aegyptus. The world trembled when the #italic Augustus#! spoke. Now, repeated civil wars, disorder, and barbarian incursions have so greatly intruded that Rome can no longer maintain even a modicum of power necessary to have the world acknowledge it. [the_bag_holder.GetName] has failed to hold together what Augustus and Trajan had built."
 bp_hegemonic_collapse.0010.a: "#italic Sic Transit Glora Mundi#!"