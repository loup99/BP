l_english:
 #New De Jure Kingdom/Empire
 BP_establish_de_jure_decisions.0100.t: "A Titular [new_kingdom_or_empire_former.GetPrimaryTitle.GetTierAsNameNoTooltip] is Now Law"
 BP_establish_de_jure_decisions.0100.desc: "After so long of only having a notional [new_kingdom_or_empire_former.GetPrimaryTitle.GetTierAsNameNoTooltip|l], [new_kingdom_or_empire_former.GetTitledFirstName] has managed to make the [new_kingdom_or_empire_former.GetPrimaryTitle.GetTierAsNameNoTooltip|l] a true legal one! [new_kingdom_or_empire_former.GetSheHe|U] has united his people under his banner, and others are now recognizing the validity of the [new_kingdom_or_empire_former.GetPrimaryTitle.GetName].\n\nTime will tell how this will shape the course of events..."
 BP_establish_de_jure_decisions.0100.the_king: "It was already fact, it is now law."
 BP_establish_de_jure_decisions.0100.good: "Good!"
 BP_establish_de_jure_decisions.0100.neutral: "Interesting..."
 BP_establish_de_jure_decisions.0100.bad: "Troubling..."
 BP_establish_de_jure_decisions.0100.how_dare_he: "This is an outrage!"
 #Swapped a Roman Province for a Titular Title
 BP_establish_de_jure_decisions.0101.t: "Provinces are Changing..."
 BP_establish_de_jure_decisions.0101.desc: "After so long of only having a notional rump Roman state, [new_kingdom_former.GetTitledFirstName] has managed to establish [new_kingdom_former.GetHerHis] realm [new_kingdom_former.GetPrimaryTitle.GetName] as a successor to the old Roman province system! While [new_kingdom_former.GetSheHe] still maintains some of the old practices of Rome, this new kingdom has solidified itself in opposition to the old provincial system.\n\nTime will tell how this will shape the course of events..."
 BP_establish_de_jure_decisions.0101.the_king: "It was already fact, it is now law."
 BP_establish_de_jure_decisions.0101.concern: "Concerning..."
 BP_establish_de_jure_decisions.0101.neutral: "Interesting..."
 