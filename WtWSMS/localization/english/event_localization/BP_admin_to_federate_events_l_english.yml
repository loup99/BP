l_english:
 #Feudal Mutation
 ## Federate to Feudal Transition
 BP_admin_to_feudal_events.0060.title: "The Feudal Mutation"
 BP_admin_to_feudal_events.0060.desc: "Despite the days of Roman dominance over our lands being long gone and the varying degrees of crisis that ensued, for centuries we kept elements of Roman government and signs of continuity in our realms, whether it was in the fiscal system, the nature of the army, or the cultural values of the nobility. Yet now, with these changes in government, a new form of governance, based more upon the mutual relationships and confidence between the nobles holding lands as personal demesne, vassals and their lieges, has begun to emerge."
 BP_admin_to_feudal_events.0060.feudal: "A new era begins."
 BP_admin_to_feudal_events.0060.clan: "We tighten our bonds between our kinsmen."
 #Inform the liege's of a Feudal Transition
 BP_admin_to_feudal_events.0061.title: "The Feudal Mutation"
 BP_admin_to_feudal_events.0061.desc: "As the memories of Roman rule wane, the post-Roman governments have slowly drifted from its original Roman nature. Now the lands rule by our vassal [the_key_feudalizing_char.GetFullName] have cast away the last vestiges of Roman rule and have adopted a new government, based on the bonds between the nobles holding lands."
 BP_admin_to_feudal_events.0061.ok: "I see..."
 the_vassal_has_changed_to_feudalism: "Your vassal, [the_key_feudalizing_char.GetFullName], has transitioned [the_key_feudalizing_char.GetHerHis] government to [feudal_government|E]"
 the_vassal_has_changed_to_clan: "Your vassal, [the_key_feudalizing_char.GetFullName], has transitioned [the_key_feudalizing_char.GetHerHis] government to [clan_government|E]"
 #Aristocracy Solidification
 ## Inform player
 BP_admin_to_feudal_events.0110.title: "The Calcification of Aristocracy"
 BP_admin_to_feudal_events.0110.desc: "As time has gone on, what was once a tax concession to pay for armies has more resembled a fief. Little changes to edicts are now being treated as if they carry the full weight of law, and this situation has been brought to our attention. Our rights to this land are now become a point of friction with [the_top_liege.GetFullName], and we can now ask to recognize these customs as facts."
 BP_admin_to_feudal_events.0110.inform_top_liege: "We will ask that reality be recognized."
 BP_admin_to_feudal_events.0110.decline: "No, I am content with my #italic de jure#! rights."
 #Liege decides
 BP_admin_to_feudal_events.0111.title: "The Calcification of Aristocracy"
 BP_admin_to_feudal_events.0111.desc: "As time has gone on, what was once a tax concession to pay for armies has more resembled a fief. Little changes to edicts are now being treated as if they carry the full weight of law, and this situation has been brought to our attention. If we do not now speak out and enforce the law, the new inheritance customs surrounding [the_vassal.GetPrimaryTitle.GetName] will be considered a settled matter of law."
 BP_admin_to_feudal_events.0111.enforce_law: "We will enforce the existing law."
 BP_admin_to_feudal_events.0111.allow_custom: "We will allow these customs to take root."
 #Liege approves
 BP_admin_to_feudal_events.0112.title: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 BP_admin_to_feudal_events.0112.desc: "After careful consideration, I consent to recognizing your hereditary claims."
 BP_admin_to_feudal_events.0112.ok: "As he should..."
 #Liege disapproves
 BP_admin_to_feudal_events.0113.title: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 BP_admin_to_feudal_events.0113.desc: "After careful consideration, I reject your spurious hereditary claims."
 BP_admin_to_feudal_events.0113.ok: "How dare he!"
 #Military Landing
 ## Inform player
 BP_admin_to_feudal_events.0210.title: "The Landing of the Army"
 BP_admin_to_feudal_events.0210.desc: "As time has gone on, what was once a temporary billeting to provide for military forces has evolved into more permanent settlement. Our men want to put down more roots in the land, with the promise that their children will continue the obligation to serve. This transition moves us further away from a professional, standing army tied to the state to a more conscripted army made up of levies and pledging loyalty to their local commander. Such a transition could become a point of friction with [the_top_liege.GetFullName], but failing to do so could lead to desertions and a loss of respect from our men."
 BP_admin_to_feudal_events.0210.inform_top_liege: "Our men deserve their reward."
 BP_admin_to_feudal_events.0210.decline: "I will not raise the issue."
 #Sub-Roman Variant
 BP_admin_to_feudal_events.0210.title_subroman: "Decentralization of the Army"
 BP_admin_to_feudal_events.0210.desc_subroman: "As time goes on, the continuation of a centralized military apparatus without sufficient taxation infrastructure is producing problems. As such, there is increased pressure to decentralize the military power of [the_vassal.GetPrimaryTitle.GetName] and to rely more upon levies than professional soldiers. Because of the difficulties, desertion is becoming a threat.\n\n#italic Will we allow military to decentralize?#!"
 BP_admin_to_feudal_events.0210.keep_centralized: "We will not allow our military might to decentralize"
 BP_admin_to_feudal_events.0210.allow_decentralization: "We cannot afford to keep such a centralized military."
 subroman_centralized_military_declines_tt: "Sub-Roman Military Decentralizes"
 subroman_centralized_military_declines_desc: "Your liege has decided to allow his military to decentralize."
 #Liege decides
 BP_admin_to_feudal_events.0211.title: "The Landing of the Army"
 BP_admin_to_feudal_events.0211.desc: "As time has gone on, what was once a temporary billeting to provide for military forces has evolved into more permanent settlement. Our men want to put down more roots in the land, with the promise that their children will continue the obligation to serve. This transition moves us further away from a professional, standing army tied to the state to a more conscripted army made up of levies and pledging loyalty to their local commander. To allow for such a change will reduce the standing army in favor of conscripts, but to refuse risks desertion by troops within [the_vassal.GetPrimaryTitle.GetName]."
 BP_admin_to_feudal_events.0211.keep_standing: "We must maintain our standing army."
 BP_admin_to_feudal_events.0211.allow_landing: "We will allow some soldiers to settle down."
 title_soldiers_may_desert_tt: "Soldiers may desert, reducing or eliminating title [men_at_arms|E] unless the ruler has sufficient [martial|E]."
 #Liege approves
 BP_admin_to_feudal_events.0212.title: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 BP_admin_to_feudal_events.0212.desc: "After careful consideration, I consent to your wise and strategic suggestion."
 BP_admin_to_feudal_events.0212.ok: "As he should..."
 #Liege disapproves
 BP_admin_to_feudal_events.0213.title: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 BP_admin_to_feudal_events.0213.desc: "After careful consideration, I reject your imprudent and nonessential suggestion."
 BP_admin_to_feudal_events.0213.ok: "How dare he!"
 #Domestic Taxation
 ## Inform player
 BP_admin_to_feudal_events.0310.title: "Remains of Roman Taxation"
 BP_admin_to_feudal_events.0310.desc: "With time, the old infrastructures that allowed for taxes of the Roman Empire to be collected have decayed. The Roman system was built upon censuses and tax collectors, which we have not maintained for a long time, meaning records are outdated and no longer correspond to reality. As such, it remains difficult to meet the previous taxation burdens. As such, we can request that [the_top_liege.GetFullName] to allow this system to partly decay instead of continuing to bear its extortionate burden."
 BP_admin_to_feudal_events.0310.seek_relief_top_liege: "We must accept have our liege accept the reality of the situation"
 BP_admin_to_feudal_events.0310.keep_taxes: "I will not raise the issue."
 #Liege only event
 BP_admin_to_feudal_events.0310.title_subroman: "Remains of Roman Taxation"
 BP_admin_to_feudal_events.0310.desc_subroman: "With time, the old infrastructures that allowed for taxes of the Roman Empire to be collected have decayed. The Roman system was built upon censuses and tax collectors, which we have not maintained for a long time, meaning records are outdated and no longer correspond to reality. As such, it remains difficult to meet the previous taxation burdens.\n\n#italic Will we allow the Roman taxation infrastructure to decay?#!"
 BP_admin_to_feudal_events.0310.keep_taxation: "The only certain things in life are Death and Taxes."
 BP_admin_to_feudal_events.0310.allow_decay: "We cannot afford to keep these taxes as they are."
 roman_taxation_infrastructure_declines_tt: "Roman Taxation infrastructure Declines"
 roman_taxation_infrastructure_declines_desc: "Your liege has decided to allow Roman Taxation infrastructure to decline."
 peasants_may_abandon_the_lands_tt: "Peasants may abandon the land to flee taxation, reducing [development|E] unless the ruler has sufficient [stewardship|E]."
 #Liege decides
 BP_admin_to_feudal_events.0311.title: "Remains of Roman Taxation"
 BP_admin_to_feudal_events.0311.desc: "With time, the old infrastructures that allowed for taxes of the Roman Empire to be collected have decayed. The Roman system was built upon censuses and tax collectors, which we have not maintained for a long time, meaning records are outdated and no longer correspond to reality. As such, it remains difficult to meet the previous taxation burdens. As such, [the_vassal.GetPrimaryTitle.GetName] requests that we adjust our records and reduce the tax collection burden on [the_vassal.GetHerHis] lands. Doing so will ease the burden, but maintaining the system will lead to peasants fleeing the land, potentially dropping revenues even more in our desire to maintain taxation."
 BP_admin_to_feudal_events.0311.keep_taxation: "The only certain things in life are Death and Taxes."
 BP_admin_to_feudal_events.0311.allow_decay: "This is a fair demand; we accept."
 #Liege approves
 BP_admin_to_feudal_events.0312.title: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 BP_admin_to_feudal_events.0312.desc: "After careful consideration, I consent to your suggestion that we allow for the degradation of tax collection."
 BP_admin_to_feudal_events.0312.ok: "As he should..."
 #Liege disapproves
 BP_admin_to_feudal_events.0313.title: "[target.Custom2('AppropriateGreeting', ROOT.Char)]"
 BP_admin_to_feudal_events.0313.desc: "After careful consideration, I reject your imprudent and nonessential suggestion. Continue to collect taxes as you have in the past."
 BP_admin_to_feudal_events.0313.ok: "How dare he!"